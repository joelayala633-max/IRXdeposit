  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f2f2f0;
    --surface: #ffffff;
    --surface2: #f7f7f5;
    --surface3: #eeede9;
    --border: rgba(0,0,0,0.08);
    --border2: rgba(0,0,0,0.14);
    --text: #111110;
    --text2: #6b6b67;
    --text3: #a8a8a4;
    --blue-bg: #eef5fd;
    --blue-text: #1a5fa8;
    --blue-border: #c2d9f5;
    --green-bg: #edf7e6;
    --green-text: #2f6b10;
    --green-border: #b8dba0;
    --accent: #1a5fa8;
    --accent-hover: #1450a0;
    --accent-dark: #0f3d7a;
    --radius: 10px;
    --radius-lg: 16px;
    --radius-xl: 20px;
  }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .header-logo-mark {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 14px; font-weight: 700; letter-spacing: -0.5px;
  }
  .header-title { font-size: 15px; font-weight: 600; letter-spacing: -0.02em; color: var(--text); }
  .header-title span { color: var(--text3); font-weight: 400; margin-left: 4px; }
  .header-date { font-size: 12px; color: var(--text3); background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 3px 10px; }
  .signout-btn { font-size: 13px; font-weight: 500; padding: 6px 14px; border-radius: var(--radius); cursor: pointer; border: 1px solid var(--border2); background: var(--surface); color: var(--text2); transition: all 0.1s; }
  .signout-btn:hover { background: var(--surface2); color: var(--text); }

  /* ── Layout ── */
  .main { max-width: 780px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }

  /* ── Cards ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.5rem;
    margin-bottom: 12px;
  }
  .card-title, .section-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.09em;
    margin-bottom: 16px;
  }
  .card-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-bottom: 0; }
  .card-header .card-title { margin-bottom: 2px; }

  /* ── Partner section ── */
  .partner-tabs { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 10px; }
  .ptab { font-size: 13px; font-weight: 500; padding: 6px 16px; border-radius: 999px; cursor: pointer; border: 1px solid var(--border2); background: var(--surface); color: var(--text2); transition: all 0.12s; }
  .ptab:hover { background: var(--surface2); color: var(--text); }
  .ptab.active { background: var(--blue-bg); color: var(--blue-text); border-color: var(--blue-border); font-weight: 600; }
  .partner-note { font-size: 12px; color: var(--text2); margin-top: 6px; line-height: 1.7; }

  /* ── Buttons ── */
  .ghost-btn { font-size: 13px; font-weight: 500; padding: 7px 16px; border-radius: var(--radius); cursor: pointer; border: 1px dashed var(--border2); background: transparent; color: var(--text2); margin-top: 10px; transition: all 0.1s; }
  .ghost-btn:hover { background: var(--surface2); color: var(--text); border-style: solid; }
  .primary-btn { font-size: 13px; font-weight: 600; padding: 8px 18px; border-radius: var(--radius); cursor: pointer; border: none; background: var(--accent); color: #fff; transition: background 0.1s; }
  .primary-btn:hover { background: var(--accent-hover); }

  /* ── Check deposit rows ── */
  .account-row { display: grid; grid-template-columns: 110px 90px 16px 1fr; gap: 8px; align-items: center; margin-bottom: 10px; }
  .account-row label { font-size: 13px; font-weight: 600; color: var(--text2); }
  .dollar-sign { font-size: 14px; color: var(--text3); font-weight: 500; text-align: center; }

  /* ── Wire rows ── */
  .wire-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .wire-top { display: grid; grid-template-columns: 1fr 1fr auto; gap: 10px; align-items: center; margin-bottom: 10px; }
  .wire-bottom { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .wire-label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 4px; }

  /* ── Inputs ── */
  input[type=text], input[type=number], input[type=password], select {
    font-family: 'Inter', -apple-system, sans-serif;

    color: var(--text);
    width: 100%;
    outline: none;
    transition: border-color 0.12s, box-shadow 0.12s;

    background-repeat: no-repeat;
    background-position: right 12px center;
    padding-right: 32px;
    cursor: pointer;
  }

  .icon-btn { background: none; border: none; cursor: pointer; font-size: 16px; color: var(--text3); padding: 6px 8px; border-radius: 8px; flex-shrink: 0; transition: all 0.1s; }
  .icon-btn:hover { color: #c0392b; background: #fdf0ee; }
  hr { border: none; border-top: 1px solid var(--border); margin: 1.25rem 0; }

  /* ── Fee breakdown ── */
  .split-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .split-card {
    background: var(--surface2);
    border-radius: var(--radius);
    padding: 16px 18px;
    border: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }
  .split-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--accent);
    opacity: 0.15;
  }
  .split-card.ib::before { background: #1a5fa8; opacity: 0.6; }
  .split-card.payee::before { background: #d97706; opacity: 0.6; }
  .split-card.gross::before { background: #16a34a; opacity: 0.6; }

  .split-card .lbl { font-size: 11px; font-weight: 600; color: var(--text3); margin-top: 5px; text-transform: uppercase; letter-spacing: 0.07em; }

  /* ── Preview ── */

    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem 1.5rem;
    font-size: 13px;
    line-height: 2;
    white-space: pre-wrap;
    font-family: 'Menlo', 'Consolas', 'Monaco', monospace;
    color: var(--text);
  }
  .copy-btn {
    margin-top: 12px;
    width: 100%;
    font-size: 14px;
    font-weight: 600;
    padding: 13px;
    border-radius: var(--radius);
    cursor: pointer;
    border: none;
    background: var(--accent);
    color: #fff;

  </header>
  <div class="main">
    <div class="card">
      <div class="card-header">
        <div>
          <div class="card-title">Partnerships</div>
          <p style="font-size:13px;color:var(--text2);margin-top:2px;">Assign a partnership &amp; term to each wire deposit below.</p>
        </div>
        <button class="primary-btn" onclick="openManage()">Manage partnerships</button>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Check deposits</div>
      <div class="account-row"><label>IPS (WY)</label><input type="number" id="ips_wy_c" min="0" value="0"><span class="dollar-sign">$</span><input type="number" id="ips_wy_a" min="0" value="0"></div>
      <div class="account-row"><label>IRX (WY)</label><input type="number" id="irx_wy_c" min="0" value="0"><span class="dollar-sign">$</span><input type="number" id="irx_wy_a" min="0" value="0"></div>
      <div class="account-row"><label>IPS (DE)</label><input type="number" id="ips_de_c" min="0" value="0"><span class="dollar-sign">$</span><input type="number" id="ips_de_a" min="0" value="0"></div>
      <div class="account-row"><label>IRX (DE)</label><input type="number" id="irx_de_c" min="0" value="0"><span class="dollar-sign">$</span><input type="number" id="irx_de_a" min="0" value="0"></div>
    </div>
    <div class="card">
      <div class="card-title">Wire deposits</div>
      <div id="wire-rows"></div>
      <button class="ghost-btn" onclick="addWireRow()">+ Add wire</button>
    </div>
    <div class="card">
      <div class="card-title">Fee breakdown</div>
      <div class="split-grid" id="split-grid"></div>
    </div>
    <div class="card">
      <div class="card-title">Teams message preview</div>
      <div class="preview-box" id="preview"></div>
      <button class="copy-btn" id="copy-btn" onclick="copyMsg()">Copy message to clipboard</button>
    </div>
    <div id="recap-section"></div>
  </div>

<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-content"></div>
</div>

<script>


// Term structure: { id, label, feeRate (%), ibPct (% of gross wire to IB), payee }
const DEFAULT_PARTNERS = [
  { id: 1, name: 'Move Docs', terms: [
    { id: 't1', label: 'Pay out', feeRate: 22.5, ibPct: 100, payee: '' },
    { id: 't2', label: 'Pay out (split)', feeRate: 32.5, ibPct: 90, payee: 'Vital Marketing' }
  ]},
  { id: 2, name: 'Other Partner', terms: [
    { id: 't3', label: 'Pay out', feeRate: 22.5, ibPct: 100, payee: '' }
  ]}
];

let partners = [];
try { partners = JSON.parse(localStorage.getItem('ib_partners_v7') || 'null') || []; } catch(e) {}
if (!partners.length) partners = JSON.parse(JSON.stringify(DEFAULT_PARTNERS));

let currentId = partners[0]?.id;
let wires = [];
let wireIdCtr = 20;

function save() { try { localStorage.setItem('ib_partners_v7', JSON.stringify(partners)); } catch(e) {} }
function cp() { return partners.find(p => p.id === currentId) || partners[0]; }
const fmt = n => '$' + Number(n).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
const pctFmt = n => Number(n).toFixed(1).replace(/\.0$/,'') + '%';
const gv = id => parseFloat(document.getElementById(id)?.value) || 0;

const checkAccounts = [
  {id:'ips_wy', label:'IPS (WY)'}, {id:'irx_wy', label:'IRX (WY)'},
  {id:'ips_de', label:'IPS (DE)'}, {id:'irx_de', label:'IRX (DE)'}
];

function termSummary(t) {
  if (t.ibPct >= 100) return `${pctFmt(t.feeRate)} → 100% InjuryBridge`;
  const payeePct = (100 - t.ibPct).toFixed(1).replace(/\.0$/,'');
  return `${pctFmt(t.feeRate)} → ${t.ibPct}% IB / ${payeePct}% ${t.payee||'payee'}`;
}

function calcSplit(amt, term) {
  if (!term) return { ib: amt, payeeAmt: 0, payee: '' };
  const ibAmt = amt * (term.ibPct / 100);
  const payeeAmt = amt - ibAmt;
  return { ib: ibAmt, payeeAmt, payee: term.payee || '' };
}

function init() {
  const p = partners[0];
  wires = [
    { id: 1, name: 'IRX (Wire)', partnerId: p?.id, termId: p?.terms[1]?.id || p?.terms[0]?.id || '', amt: 0 },
    { id: 2, name: 'IPS (Wire)', partnerId: p?.id, termId: p?.terms[1]?.id || p?.terms[0]?.id || '', amt: 0 }
  ];
  renderWireRows(); calc();
  document.querySelectorAll('input[type=number]').forEach(el => el.addEventListener('input', calc));
}





function termOptions(partner, selectedId) {
  let opts = `<option value="">— select term —</option>`;
  (partner?.terms||[]).forEach(t => {
    opts += `<option value="${t.id}" ${t.id===selectedId?'selected':''}>${t.label} (${pctFmt(t.feeRate)})</option>`;
  });
  return opts;
}

function partnerOptions(selectedPid) {
  return partners.map(p =>
    `<option value="${p.id}" ${p.id===selectedPid?'selected':''}>${esc(p.name)}</option>`
  ).join('');
}

const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function termOptionsForPartner(pid, selectedTermId) {
  const p = partners.find(x => x.id === pid);
  let opts = `<option value="">— select term —</option>`;
  (p?.terms||[]).forEach(t => {
    opts += `<option value="${t.id}" ${t.id===selectedTermId?'selected':''}>${esc(t.label)} (${pctFmt(t.feeRate)})</option>`;
  });
  return opts;
}

function renderWireRows() {
  if (!document.getElementById('wire-rows')) return;
  document.getElementById('wire-rows').innerHTML = wires.map(w => `
    <div class="wire-card">
      <div class="wire-top">
        <div>
          <div class="wire-label">Account name</div>
          <input type="text" value="${esc(w.name)}" placeholder="e.g. IRX (Wire)" oninput="updateWire(${w.id},'name',this.value)">
        </div>
        <div>
          <div class="wire-label">Amount ($)</div>
          <input type="number" value="${w.amt||''}" min="0" placeholder="0.00" oninput="updateWire(${w.id},'amt',this.value)">
        </div>
        <button class="icon-btn" onclick="removeWire(${w.id})" title="Remove wire" style="margin-top:20px;">✕</button>
      </div>
      <div class="wire-bottom">
        <div>
          <div class="wire-label">Partnership</div>
          <select onchange="updateWirePartner(${w.id},this.value)">${partnerOptions(w.partnerId)}</select>
        </div>
        <div>
          <div class="wire-label">Term</div>
          <select onchange="updateWire(${w.id},'termId',this.value)">${termOptionsForPartner(w.partnerId, w.termId)}</select>
        </div>
      </div>
    </div>`).join('');
}

function updateWirePartner(id, pid) {
  const w = wires.find(x => x.id === id);
  if (!w) return;
  w.partnerId = Number(pid);
  const p = partners.find(x => x.id === w.partnerId);
  w.termId = p?.terms[0]?.id || '';
  renderWireRows(); calc();
}

function updateWire(id, field, val) {
  const w = wires.find(x => x.id === id);
  if (!w) return;
  w[field] = field === 'amt' ? parseFloat(val)||0 : val;
  calc();
}

function addWireRow() {
  if (!partners.length) return;
  const p = partners[0];
  wires.push({ id: ++wireIdCtr, name: '', partnerId: p.id, termId: p.terms[0]?.id||'', amt: 0 });
  renderWireRows(); calc();
}

function removeWire(id) { wires = wires.filter(w => w.id !== id); renderWireRows(); calc(); }

function calc() {
  if (!partners.length) return;
  const today = new Date().toLocaleDateString('en-US',{month:'numeric',day:'numeric',year:'numeric'});
  const checkTotal = checkAccounts.reduce((s,a) => s + gv(a.id+'_a'), 0);

  // compute splits per wire using each wire's own partnership+term
  const wireSplits = wires.map(w => {
    const p = partners.find(x => x.id === w.partnerId);
    const term = p?.terms.find(t => t.id === w.termId);
    return calcSplit(w.amt, term);
  });

  const totalIBwires = wireSplits.reduce((s,x) => s + x.ib, 0);
  const totalPayeeAll = wireSplits.reduce((s,x) => s + x.payeeAmt, 0);
  const totalIB = checkTotal + totalIBwires;
  const grandTotal = checkTotal + wires.reduce((s,w) => s + w.amt, 0);

  // fee breakdown — collect unique payees
  const payeeMap = {};
  wireSplits.forEach(s => { if (s.payeeAmt > 0 && s.payee) payeeMap[s.payee] = (payeeMap[s.payee]||0) + s.payeeAmt; });
  const payeeCards = Object.entries(payeeMap).map(([name, amt]) =>
    `<div class="split-card"><div class="val">${fmt(amt)}</div><div class="lbl">${name}</div></div>`
  ).join('');
  const colCount = 2 + Object.keys(payeeMap).length;
  document.getElementById('split-grid').style.gridTemplateColumns = Array(colCount).fill('1fr').join(' ');
  document.getElementById('split-grid').innerHTML = `
    <div class="split-card ib"><div class="val">${fmt(totalIB)}</div><div class="lbl">InjuryBridge deposit</div></div>
    ${payeeCards}
    <div class="split-card gross"><div class="val">${fmt(grandTotal)}</div><div class="lbl">Total gross</div></div>
  `;

  // combined Teams message — group wires by partnership
  const partnerNames = [...new Set(wires.filter(w=>w.amt>0).map(w => partners.find(x=>x.id===w.partnerId)?.name).filter(Boolean))];
  const partnerStr = partnerNames.length ? partnerNames.join(', ') : '—';
  let lines = [`Hi! Please see deposits for today — ${today} Deposit List\nPartnerships: ${partnerStr}\n`];
  checkAccounts.forEach(a => {
    const c = gv(a.id+'_c'), amt = gv(a.id+'_a');
    if (amt > 0) lines.push(`• ${a.label} — ${c} check${c!==1?'s':''} — ${fmt(amt)}`);
  });
  wires.forEach((w, i) => {
    if (w.amt > 0) {
      const p = partners.find(x => x.id === w.partnerId);
      const term = p?.terms.find(t => t.id === w.termId);
      const s = wireSplits[i];
      let line = `• ${w.name||'Wire'} [${p?.name||'?'}] — 1 wire — ${fmt(w.amt)}`;
      if (term) {
        line += ` | ${pctFmt(term.feeRate)} → ${fmt(s.ib)} to InjuryBridge`;
        if (s.payeeAmt > 0) line += ` | ${fmt(s.payeeAmt)} to ${s.payee}`;
      }
      lines.push(line);
    }
  });
  lines.push(`\nTotal gross: ${fmt(grandTotal)}`);
  lines.push(`→ InjuryBridge deposit: ${fmt(totalIB)}`);
  Object.entries(payeeMap).forEach(([name, amt]) => lines.push(`→ ${name} (excluded): ${fmt(amt)}`));
  document.getElementById('preview').textContent = lines.join('\n');

  // per-partnership recaps
  renderRecaps(today, wireSplits);
}

function renderRecaps(today, wireSplits) {
  const involved = partners.filter(p => wires.some(w => w.partnerId === p.id && w.amt > 0));
  if (!involved.length) { document.getElementById('recap-section').innerHTML = ''; return; }

  const html = involved.map(p => {
    const pWires = wires.map((w,i) => ({w, s: wireSplits[i]})).filter(({w}) => w.partnerId === p.id && w.amt > 0);
    const pWireTotal = pWires.reduce((s,{w}) => s + w.amt, 0);
    const pIB = pWires.reduce((s,{s:sp}) => s + sp.ib, 0);
    const pPayeeMap = {};
    pWires.forEach(({s}) => { if (s.payeeAmt > 0 && s.payee) pPayeeMap[s.payee] = (pPayeeMap[s.payee]||0) + s.payeeAmt; });

    const wireLines = pWires.map(({w, s}) => {
      const term = p.terms.find(t => t.id === w.termId);
      let l = `• ${w.name||'Wire'} — ${fmt(w.amt)}`;
      if (term) { l += ` | ${pctFmt(term.feeRate)} → ${fmt(s.ib)} to InjuryBridge`; if (s.payeeAmt>0) l += ` | ${fmt(s.payeeAmt)} to ${s.payee}`; }
      return l;
    }).join('\n');

    const recapText = [`${p.name} — Recap ${today}`, '', wireLines, '', `Wire total: ${fmt(pWireTotal)}`, `→ InjuryBridge: ${fmt(pIB)}`, ...Object.entries(pPayeeMap).map(([n,a])=>`→ ${n}: ${fmt(a)}`)].join('\n');

    return `<div class="recap-card"><div class="recap-card-header"><div><div class="recap-name">${p.name}</div><div class="recap-meta">${pWires.length} wire${pWires.length!==1?'s':''} · gross ${fmt(pWireTotal)}</div></div><button class="recap-copy-btn" onclick="copyRecap(this,'${p.id}')">Copy recap</button></div><div class="recap-preview" id="recap-${p.id}">${recapText}</div></div>`;
  }).join('');

  document.getElementById('recap-section').innerHTML = `<div class="recap-header">Partnership recaps</div>${html}`;

  // store recap text for copy
  involved.forEach(p => {
    const pWires = wires.map((w,i) => ({w, s: wireSplits[i]})).filter(({w}) => w.partnerId === p.id && w.amt > 0);
    const pWireTotal = pWires.reduce((s,{w}) => s + w.amt, 0);
    const pIB = pWires.reduce((s,{s:sp}) => s + sp.ib, 0);
    const pPayeeMap = {};
    pWires.forEach(({s}) => { if (s.payeeAmt > 0 && s.payee) pPayeeMap[s.payee] = (pPayeeMap[s.payee]||0) + s.payeeAmt; });
    const wireLines = pWires.map(({w, s}) => {
      const term = p.terms.find(t => t.id === w.termId);
      let l = `• ${w.name||'Wire'} — ${fmt(w.amt)}`;
      if (term) { l += ` | ${pctFmt(term.feeRate)} → ${fmt(s.ib)} to InjuryBridge`; if (s.payeeAmt>0) l += ` | ${fmt(s.payeeAmt)} to ${s.payee}`; }
      return l;
    }).join('\n');
    const recapText = [`${p.name} — Recap ${today}`, '', wireLines, '', `Wire total: ${fmt(pWireTotal)}`, `→ InjuryBridge: ${fmt(pIB)}`, ...Object.entries(pPayeeMap).map(([n,a])=>`→ ${n}: ${fmt(a)}`)].join('\n');
    window['__recap_'+p.id] = recapText;
  });
}

function copyRecap(btn, pid) {
  const text = window['__recap_'+pid] || '';
  if (!text) return;
  const doFallback = () => {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); } catch(e) {}
    document.body.removeChild(ta);
    btn.textContent = 'Copied!'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy recap'; btn.classList.remove('copied'); btn.classList.remove('copied'); }, 2000);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = 'Copied!'; btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy recap'; btn.classList.remove('copied'); btn.classList.remove('copied'); }, 2000);
    }).catch(doFallback);
  } else { doFallback(); }
}

function copyMsg() {
  const text = document.getElementById('preview').textContent;
  const btn = document.getElementById('copy-btn');
  const done = () => {
    btn.textContent = 'Copied!'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy message'; btn.classList.remove('copied'); }, 2000);
  };
  const doFallback = () => {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); } catch(e) {}
    document.body.removeChild(ta); done();
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(done).catch(doFallback);
  } else { doFallback(); }
}

function openManage() { showManageMain(); document.getElementById('modal-overlay').classList.add('open'); }
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

function showManageMain() {
  document.getElementById('modal-content').innerHTML = `
    <h3>Manage partnerships</h3>
    <div id="plist">${renderPList()}</div>
    <hr style="margin:12px 0;">
    <div style="font-size:12px;color:var(--text2);margin-bottom:4px;">Add new partnership</div>
    <label>Name</label>
    <input type="text" id="new-name" placeholder="e.g. ABC Health">
    <div class="modal-btns">
      <button onclick="closeModal()">Close</button>
      <button class="primary" onclick="addPartner()">Add</button>
    </div>`;
}

function renderPList() {
  if (!partners.length) return '<p style="font-size:13px;color:var(--text2);">No partnerships yet.</p>';
  return partners.map(p => `
    <div class="edit-row">
      <span class="ename">${p.name}</span>
      <span class="erate">${p.terms.length} term${p.terms.length!==1?'s':''}</span>
      <button class="icon-btn" onclick="showEditPartner(${p.id})">✎</button>
      <button class="icon-btn" onclick="removePartner(${p.id})" style="color:#a32d2d;">✕</button>
    </div>`).join('');
}

function addPartner() {
  const name = document.getElementById('new-name').value.trim();
  if (!name) return;
  partners.push({ id: Date.now(), name, terms: [] });
  save();
  document.getElementById('plist').innerHTML = renderPList();
  document.getElementById('new-name').value = '';
}

function removePartner(id) {
  if (partners.length <= 1) return;
  partners = partners.filter(p => p.id !== id);
  if (currentId === id) currentId = partners[0].id;
  // Reassign any wires that referenced the deleted partner
  wires.forEach(w => {
    if (w.partnerId === id) {
      w.partnerId = partners[0].id;
      w.termId = partners[0].terms[0]?.id || '';
    }
  });
  save(); renderWireRows(); calc();
  document.getElementById('plist').innerHTML = renderPList();
}

function showEditPartner(id) {
  const p = partners.find(x => x.id === id);
  document.getElementById('modal-content').innerHTML = `
    <h3>Edit: ${p.name}</h3>
    <label>Partnership name</label>
    <input type="text" id="ep-name" value="${p.name}" oninput="liveRename(${id},this.value)">
    <div style="margin-top:1rem;margin-bottom:4px;font-size:13px;font-weight:500;">Terms</div>
    <p style="font-size:12px;color:var(--text2);margin-bottom:8px;">Each term is a fee rule you can assign to wire deposits.</p>
    <div id="term-list">${renderTermList(p)}</div>
    <hr style="margin:10px 0;">
    <div style="font-size:12px;color:var(--text2);margin-bottom:4px;">Add term</div>
    ${termFormFields('nt', null)}
    <div class="modal-btns">
      <button onclick="showManageMain()">Back</button>
      <button class="primary" onclick="addTerm(${id})">Add term</button>
    </div>`;
  updateSplitPreview('nt');
}

function termFormFields(prefix, t) {
  const label = t ? t.label : '';
  const feeRate = t ? t.feeRate : 32.5;
  const ibPct = t ? t.ibPct : 90;
  const payee = t ? (t.payee||'') : '';
  return `
    <label>Term label</label>
    <input type="text" id="${prefix}-label" placeholder="e.g. Pay out" value="${label}">
    <div class="split-editor">
      <div class="split-editor-title">Fee split settings</div>
      <div class="srow">
        <label>Fee rate (%)</label>
        <input type="number" id="${prefix}-feerate" value="${feeRate}" min="0" max="100" step="0.5" style="width:130px;" oninput="updateSplitPreview('${prefix}')">
      </div>
      <div class="srow">
        <label>InjuryBridge receives (%)</label>
        <input type="number" id="${prefix}-ibpct" value="${ibPct}" min="0" max="100" step="1" style="width:130px;" oninput="updateSplitPreview('${prefix}')">
      </div>
      <div class="srow">
        <label>Payee name (gets the rest)</label>
        <input type="text" id="${prefix}-payee" value="${payee}" placeholder="e.g. Vital Marketing" style="width:130px;" oninput="updateSplitPreview('${prefix}')">
      </div>
      <div class="split-preview" id="${prefix}-preview"></div>
    </div>`;
}

function updateSplitPreview(prefix) {
  const feeRate = parseFloat(document.getElementById(prefix+'-feerate')?.value) || 0;
  const ibPct = parseFloat(document.getElementById(prefix+'-ibpct')?.value) || 0;
  const payeePct = Math.max(0, 100 - ibPct);
  const payee = document.getElementById(prefix+'-payee')?.value?.trim() || 'payee';
  const el = document.getElementById(prefix+'-preview');
  if (!el) return;
  const ibAmt = (1000 * ibPct / 100).toFixed(2);
  const payeeAmt = (1000 * payeePct / 100).toFixed(2);
  let line = `Example — $1,000 wire:\n→ $${ibAmt} to InjuryBridge (${ibPct}%)`;
  if (payeePct > 0) line += `\n→ $${payeeAmt} to ${payee} (${payeePct.toFixed(1).replace(/\.0$/,'')}%)`;
  el.textContent = line;
}

function liveRename(id, val) {
  const p = partners.find(x => x.id === id);
  if (p) { p.name = val; save(); renderWireRows(); }
}

function renderTermList(p) {
  if (!p.terms.length) return '<p style="font-size:13px;color:var(--text2);">No terms yet.</p>';
  return p.terms.map(t => `
    <div class="edit-row">
      <span class="ename">${t.label}</span>
      <span class="erate">${termSummary(t)}</span>
      <button class="icon-btn" onclick="showEditTerm(${p.id},'${t.id}')">✎</button>
      <button class="icon-btn" onclick="removeTerm(${p.id},'${t.id}')" style="color:#a32d2d;">✕</button>
    </div>`).join('');
}

function addTerm(pid) {
  const p = partners.find(x => x.id === pid);
  const label = document.getElementById('nt-label').value.trim();
  if (!label) return;
  p.terms.push({
    id: 't'+Date.now(),
    label,
    feeRate: parseFloat(document.getElementById('nt-feerate').value) || 0,
    ibPct: parseFloat(document.getElementById('nt-ibpct').value) || 100,
    payee: document.getElementById('nt-payee').value.trim()
  });
  save(); renderWireRows();
  document.getElementById('term-list').innerHTML = renderTermList(p);
  document.getElementById('nt-label').value = '';
  document.getElementById('nt-feerate').value = '32.5';
  document.getElementById('nt-ibpct').value = '90';
  document.getElementById('nt-payee').value = '';
  updateSplitPreview('nt');
}

function removeTerm(pid, tid) {
  const p = partners.find(x => x.id === pid);
  p.terms = p.terms.filter(t => t.id !== tid);
  // Clear termId on wires that referenced this term
  wires.forEach(w => { if (w.termId === tid) w.termId = p.terms[0]?.id || ''; });
  save(); renderWireRows(); calc();
  document.getElementById('term-list').innerHTML = renderTermList(p);
}

function showEditTerm(pid, tid) {
  const p = partners.find(x => x.id === pid);
  const t = p.terms.find(x => x.id === tid);
  document.getElementById('modal-content').innerHTML = `
    <h3>Edit term</h3>
    ${termFormFields('et', t)}
    <div class="modal-btns">
      <button onclick="showEditPartner(${pid})">Back</button>
      <button class="primary" onclick="saveTerm(${pid},'${tid}')">Save</button>
    </div>`;
  updateSplitPreview('et');
}

function saveTerm(pid, tid) {
  const p = partners.find(x => x.id === pid);
  const t = p.terms.find(x => x.id === tid);
  t.label = document.getElementById('et-label').value.trim() || t.label;
  t.feeRate = parseFloat(document.getElementById('et-feerate').value) || 0;
  t.ibPct = parseFloat(document.getElementById('et-ibpct').value) || 100;
  t.payee = document.getElementById('et-payee').value.trim();
  save(); renderWireRows(); calc();
  showEditPartner(pid);
}

// Set header date
const hd = document.getElementById('header-date');
if (hd) hd.textContent = new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});

init();
</script>
</body>
